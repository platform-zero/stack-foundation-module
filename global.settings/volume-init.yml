services:
  volume-init:
    image: alpine@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    container_name: volume-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Volume Init: Creating bind mount directories ==="
        mkdir -p /mnt/vector_root/qdrant
        mkdir -p /mnt/vector_root/opensearch
        mkdir -p /mnt/pg-ssd-root/postgres-ssd
        mkdir -p ${NOCOW_DB_DIR}/postgres
        mkdir -p ${NOCOW_DB_DIR}/mariadb
        mkdir -p ${STACK_VOLUME_ROOT}
        for name in \
          alertmanager_data bookstack_data element_data forgejo_data grafana_data loki_data kopia_data \
          mailserver_data mariadb_data onlyoffice_data onboarding_data open_webui_data planka_data \
          planka_caddy_ca postgres_data prometheus_data redis_data vaultwarden_data vaultwarden_caddy_ca \
          jupyterhub_data homeassistant_config homeassistant_data synapse_data ntfy_data couchdb_data \
          registry_data isolated_registry_data forgejo_runner_data forgejo_runner_token pipeline_data \
          airflow_logs nats_data caddy_config caddy_certs caddy_ca qbittorrent_config caddy_data \
          datafetcher_data model_context_server_known_hosts model_context_server_scripts; do
          mkdir -p "${STACK_VOLUME_ROOT}/$${name}"
        done
        mkdir -p ${QBITTORRENT_DATA_ROOT}
        mkdir -p ${SEAFILE_MEDIA_ROOT}
        mkdir -p ${JELLYFIN_MEDIA_ROOT}
        echo "Setting permissions..."
        chmod 755 /mnt/vector_root/qdrant
        chmod 755 /mnt/vector_root/opensearch
        chmod 755 /mnt/pg-ssd-root/postgres-ssd
        chmod 755 ${NOCOW_DB_DIR}
        chmod 755 ${NOCOW_DB_DIR}/postgres
        chmod 755 ${NOCOW_DB_DIR}/mariadb
        chmod 755 ${STACK_VOLUME_ROOT}
        chmod 755 ${QBITTORRENT_DATA_ROOT}
        chmod 755 ${SEAFILE_MEDIA_ROOT}
        chown ${MEDIA_WRITER_UID}:${MEDIA_WRITER_GID} ${JELLYFIN_MEDIA_ROOT}
        chmod 775 ${JELLYFIN_MEDIA_ROOT}
        echo "✓ Volume directories initialized successfully"
    volumes:
      - ${VECTOR_DB_ROOT}:/mnt/vector_root:rw
      - ${PG_SSD_ROOT}:/mnt/pg-ssd-root:rw
      - ${STACK_VOLUME_ROOT}:${STACK_VOLUME_ROOT}:rw
      - ${QBITTORRENT_DATA_ROOT}:${QBITTORRENT_DATA_ROOT}:rw
      - ${SEAFILE_MEDIA_ROOT}:${SEAFILE_MEDIA_ROOT}:rw
      - ${JELLYFIN_MEDIA_ROOT}:${JELLYFIN_MEDIA_ROOT}:rw
      - ${NOCOW_DB_DIR}:${NOCOW_DB_DIR}:rw
