services:
  volume-init:
    image: alpine@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    container_name: volume-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Volume Init: Creating bind mount directories ==="
        mkdir -p /mnt/vector_root/qdrant
        mkdir -p /mnt/vector_root/opensearch
        mkdir -p /mnt/pg_ssd_root/postgres-ssd
        mkdir -p ${SEAFILE_MEDIA_ROOT}
        mkdir -p ${JELLYFIN_MEDIA_ROOT}
        echo "Setting permissions..."
        chmod 755 /mnt/vector_root/qdrant
        chmod 755 /mnt/vector_root/opensearch
        chmod 755 /mnt/pg_ssd_root/postgres-ssd
        chmod 755 ${SEAFILE_MEDIA_ROOT}
        chown ${MEDIA_WRITER_UID}:${MEDIA_WRITER_GID} ${JELLYFIN_MEDIA_ROOT}
        chmod 775 ${JELLYFIN_MEDIA_ROOT}
        echo "✓ Volume directories initialized successfully"
    volumes:
      - ${VECTOR_DB_ROOT}:/mnt/vector_root:rw
      - ${PG_SSD_ROOT}:/mnt/pg_ssd_root:rw
      - ${SEAFILE_MEDIA_ROOT}:${SEAFILE_MEDIA_ROOT}:rw
      - ${JELLYFIN_MEDIA_ROOT}:${JELLYFIN_MEDIA_ROOT}:rw
      - ${NOCOW_DB_DIR}:${NOCOW_DB_DIR}:rw
